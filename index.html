<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta data and document title -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASHA nutrition</title>
    
    <!-- External fonts and libraries -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script src="https://unpkg.com/axios@1.6.7/dist/axios.min.js"></script>
    
    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="chatbot_v2_styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <!-- =======================
        STEP B.1 – PAGE WRAPPER
        ======================= -->
    <div class="page">
        <header class="topbar">
            <div class="logo">
                ASHA
            </div>

            <button id="themeToggle" class="theme-toggle">
                🌙 Dark Mode
            </button>
        </header>

        <div class="app-layout">

        <!-- LEFT PANEL -->
        <aside class="left-panel">

            <!-- Did You Know -->
            <div id="did-you-know-container">
            <h3 class="fact-title">Did You Know?</h3>
            <div id="did-you-know-text"></div>
            </div>

            <div class="saved-recipes-panel">
                <h3 class="sidebar-title">Saved Recipes</h3>
                <div id="savedRecipesList"></div>
            </div>

            <!-- Calorie Calculator -->
            <div class="container2">
            <div class="calculator-scroll">
                <h2>Calorie Calculator</h2>
                <form id="calorieForm">
                <label>Age: <input type="number" id="age" required></label>

                <label>Gender:
                <select id="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                </label>

                <label>Height (cm): <input type="number" id="height" required></label>
                <label>Weight (kg): <input type="number" id="weight" required></label>

                <label>Activity Level:
                <select id="activity">
                    <option value="1.2">Sedentary</option>
                    <option value="1.375">Lightly active</option>
                    <option value="1.55">Moderately active</option>
                    <option value="1.725">Very active</option>
                    <option value="1.9">Super active</option>
                </select>
                </label>

                <label>Goal:
                <select id="goal">
                    <option value="maintenance">Maintenance</option>
                    <option value="bulking">Bulking</option>
                    <option value="cutting">Cutting</option>
                </select>
                </label>

                <button type="submit">Calculate</button>
                </form>

            </div>
            </div>

        </aside>


        <!-- MAIN AI PANEL -->
        <main class="main-panel">

            <section class="hero-input">
            <div class="form-container">
                <form id="recipe-generator-form">
                <input
                    type="text"
                    placeholder="Ask ASHA for a recipe..."
                    autofocus
                    required
                    autocomplete="off"
                    class="instructions"
                    id="user-instructions"
                />
                <input type="submit" value="Generate" class="submit-button" />
                </form>

                <div class="prompt-chips">
                    <button class="chip">High protein breakfast</button>
                    <button class="chip">10 minute dinner</button>
                    <button class="chip">Vegetarian Indian meal</button>
                    <button class="chip">Muscle gain lunch</button>
                    <button class="chip">Low calorie snack</button>
                </div>

                <div class="hint">
                Try: "High protein breakfast" or "Italian pasta"
                </div>
            </div>
            </section>

            <section class="chat-section">
                <div id="chatContainer" class="chat-container"></div>
                <div class="ai-explanation hidden" id="aiExplanation"></div>
            </section>

            <section class="nutrition-section">
            <div class="nutrition-summary hidden" id="nutritionSummary"></div>
            </section>

        </main>


        <!-- RIGHT PANEL -->
        <aside class="right-panel">

            <h3 class="sidebar-title">Quick Cuisine Ideas</h3>

            <div class="meal-card-right" data-cuisine="Italian">Italian</div>
            <div class="meal-card-right" data-cuisine="French">French</div>
            <div class="meal-card-right" data-cuisine="Mexican">Mexican</div>
            <div class="meal-card-right" data-cuisine="Chinese">Chinese</div>
            <div class="meal-card-right" data-cuisine="Indian">Indian</div>
            <div class="meal-card-right" data-cuisine="Japanese">Japanese</div>
            <div class="meal-card-right" data-cuisine="Thai">Thai</div>
            <div class="meal-card-right" data-cuisine="Greek">Greek</div>

        </aside>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            
            <p class="footer-name">&copy;
                <a href="https://dipanjanchakraborty.com" target="_blank" class="footer-name-link">
                    <strong>Dipanjan Chakraborty</strong>
                </a>
            </p>

            <div class="footer-links">
            <a href="https://www.linkedin.com/in/dipanjan44" target="_blank">LinkedIn</a>
            <a href="https://www.instagram.com/dipanjan_it_is_developer" target="_blank">Instagram</a>
            <a href="developer.dipanjan2255@gmail.com">Email</a>
            </div>

        </div>
    </footer>

    <!-- Facts Script -->
    <script>
        const facts = [
        "In Iceland, fermented shark (hákarl) is considered a delicacy, known for its strong ammonia smell.",
        "The French consume approximately 30,000 tons of snails (escargots) each year.",
        "Casu martzu is a Sardinian sheep milk cheese that contains live insect larvae.",
        "Kiviaq is a traditional Inuit food from Greenland that involves fermenting auk birds inside a seal skin.",
        "Balut is a fertilized duck embryo that is boiled and eaten in the shell, popular in the Philippines.",
        "Surströmming is a Swedish fermented herring with a notoriously strong odor.",
        "Fugu is a Japanese delicacy that can be lethally poisonous if not prepared correctly."
        ];

        function updateFact() {
        const randomIndex = Math.floor(Math.random() * facts.length);
        document.getElementById('did-you-know-text').textContent = facts[randomIndex];
        }

        updateFact();
        setInterval(updateFact, 7000);
    </script>

    <script src="chatbot_v2_script.js"></script>
    </body>
</html>
